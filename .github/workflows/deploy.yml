name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npx vite build --base /RentMyGadgets/
        env:
          NODE_ENV: production

      - name: Copy static image assets to build output
        run: |
          cp -r public/images dist/public/images
          mkdir -p dist/public/stock_images
          cp -r attached_assets/stock_images/* dist/public/stock_images/ 2>/dev/null || true
          mkdir -p dist/public/attached_assets
          find attached_assets -maxdepth 1 -type f \( -iname "*.webp" -o -iname "*.png" -o -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.avif" -o -iname "*.gif" \) -exec cp {} dist/public/attached_assets/ \; 2>/dev/null || true

      - name: Copy index.html for SPA routing
        run: cp dist/public/index.html dist/public/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
